spring.application.name=RevConnectWeb


#spring.datasource.url=jdbc:mysql://localhost:3306/revweb
#spring.datasource.username=revweb
#spring.datasource.password=revweb
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/revweb?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:revweb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:revweb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

#Hibernate Config
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Application
server.port=8080

app.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32+_CHARS
app.jwt.expiration-ms=86400000
